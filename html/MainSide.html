<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8" />
    <title>Synthwave Bakgrund</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/buttons&text.css">
    <link rel="stylesheet" href="/css/topbar.css">
</head>
<body>
    <div id="navbar-container"></div>
    <section id="mid-section">
        <aside id="left-aside">
          
        </aside>
        <section id="hero-wrapper">
            <div id="hero">
                <div id="portrait">
                    <img src="/Images/portrait-pixelated.png" id="img-self-portrait" alt="Self portatrit of author in synthwave theme">
                </div>
                <div id="education">
                    <p id="education1">.NET DEVELOPER</p>
                    <p id="education2">CLOUD FOCUS</p>
                </div>
            </div>
        </section>
        <aside id="right-aside">
            
        </aside>
    </section>
   
    <div class="scene">
        <div class="sky">
            <div class="sun">
            <div class="sun-lines"></div>
        </div>
        </div>
        <div class="ground"></div>
    </div>
    <footer>
        <div id="footer-left">
            <button class="footer-buttons" id="CV-button">Download CV</button>
        </div>
        <div class="footer-center">
            <div class="social-media">
                <div class="social-media-right">
                    <a href="https://www.linkedin.com/" target="_blank" aria-label="linkdn">
                        <img src="/images/linkdn.png" class="social-media-img" alt="bildlänk till linkdn">
                    </a>
                </div>
            </div>
            <div class="social-media">
                <div class="social-media-left">
                    <a href="https://github.com/" target="_blank" aria-label="GitHub">
                        <img src="/images/github.png" class="social-media-img" alt="bildlänk till GitHub">
                    </a>
                </div>
            </div>
        </div>
        <div id="footer-right">
            <button class=footer-buttons id="music-toggle">🎵</button>
            <div id="music-menu" class="hidden-menu">
                <button class="song" data-src="/Sounds/NR1.mp3">NR1</button>
                <button class="song" data-src="/Sounds/NR2.mp3">NR2</button>
                <button class="song" data-src="/Sounds/NR3.mp3">NR3</button>
            </div>
        </div>
        <audio id="music"></audio>
    </footer>
    <script src="/scripts/navbar.js"></script>
    <script src="/scripts/background.js"></script>
</body>

</html>
