<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="/css/background.css">
    <link rel="stylesheet" href="/css/topbar.css">
    <link rel="stylesheet" href="/css/mouse.css">
    <link rel="stylesheet" href="/css/contact.css">
</head>
<body>
    <div id="navbar-container"></div>
    <div class="background"></div>
    <div class="contact-container">
        <form action="https://api.web3forms.com/submit" method="POST" class="contact">
            <div class="contact-left-title">
                <h2>Get in touch</h2>
                <hr>
            </div>
            <input type="hidden" name="access_key" value="591feca6-6e33-47cf-bdab-e766f9f9cf0a">
            <input type="text" name="name" placeholder="Your Name" class="contacts-inputs" required>
            <input type="email" name="email" placeholder="Your Email" class="contacts-inputs" required>
            <textarea name="message" placeholder="Your Message" class="contacts-inputs" required></textarea>
            <input type="checkbox" name="botcheck" class="hidden" style="display: none;">
            <button type="submit">Send Message</button>
        </form>
    </div>

    <script src="/scripts/cursor.js"></script>
    <script src="/scripts/navbar.js"></script>
</body>
</html>
