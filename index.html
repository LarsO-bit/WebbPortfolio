<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthwave Bakgrund</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/topbar.css">
</head>
<body>
    <div id="bg"></div>
    <div id="navbar-container"></div>
    <section id="mid-section">
        <aside id="left-aside">
          
        </aside>
        <section id="hero-wrapper">
            <div id="hero">
                <div id="portrait">
                    <img src="Images/portrait.jpg" id="img-self-portrait" alt="Self portatrit of author in synthwave theme">
                </div>

                <div id="education">
                    <p id="education1">.NET DEVELOPER</p>
                    <p class="eng" id="education2">CLOUD FOCUS</p>
                    <p class="sv" id="education2">CLOUD FOKUS</p>
                </div>
            </div>
        </section>
        <aside id="right-aside">

        </aside>
    </section>
   
    <div class="scene">
        <div class="sky">
            <div class="sun">
            <div class="sun-lines"></div>
        </div>
        </div>
        <div class="ground"></div>
    </div>
    <footer>
        <div id="footer-left">
            <a href="CV Lars Olsson.pdf" download=><button class="footer-buttons">
                <span class="sv">Ladda ner CV</span>
                <span class="eng">Download CV</span>
            </button></a>
        </div>
        <div id="footer-center">
             <div class="social-media-footer">
                <a href="https://www.linkedin.com/in/lars-olsson-4335a817a/" target="_blank" aria-label="linkdn">
                    <img src="images/linkdn.png" class="social-media-img" alt="bildlänk till linkdn">
                </a>
                <a href="https://github.com/LarsO-bit" target="_blank" aria-label="GitHub">
                    <img src="images/github.png" class="social-media-img" alt="bildlänk till GitHub">
                </a>
            </div>
        </div>
        <div id="footer-right">
            <div class="weather-widget">
                <img id="weather-icon" alt="An icon displaying the current weather in Gothenburg">
                <div class="weather-info">
                    <p id="weather-temp"></p>
                    <p id="weather-city"></p>
                </div>
            </div>
        </div>
    </footer>
    <script src="scripts/navbar.js"></script>
    <script src="scripts/background.js"></script>
    <script src="scripts/weather.js"></script>
</body>

</html>
